version: '3.8'

services:
  web-ui:
    build: .
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:3001/api
    volumes:
      - ./apps/web-ui/src:/app/apps/web-ui/src
    command: npm run dev -- --host

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./apps/backend-api:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
